<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome to TASTE GO</title>
<style>
/* Reset default styles */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

/* Body and background */
body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #ff4d4d 0%, #ff6b6b 100%);
    color: #fff;
}

/* Container */
.welcome-container {
    text-align: center;
    background: rgba(0, 0, 0, 0.6);
    padding: 50px 40px;
    border-radius: 15px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.3);
    max-width: 450px;
    width: 90%;
    animation: fadeIn 1.5s ease-in-out;
}

/* Fade-in animation */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Heading */
.welcome-container h1 {
    font-size: 2.5rem;
    margin-bottom: 20px;
    font-weight: 700;
}

/* Paragraph */
.welcome-container p {
    font-size: 1.1rem;
    margin-bottom: 30px;
    line-height: 1.5;
}

/* Button */
.btn {
    display: inline-block;
    padding: 12px 30px;
    background: #fff;
    color: #ff4d4d;
    font-weight: 600;
    text-decoration: none;
    border-radius: 50px;
    transition: 0.3s ease-in-out;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

.btn:hover {
    background: #ff4d4d;
    color: #fff;
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}

/* Responsive adjustments */
@media (max-width: 500px) {
    .welcome-container {
        padding: 40px 20px;
    }
    .welcome-container h1 {
        font-size: 2rem;
    }
}
</style>
</head>
<body>

<div class="welcome-container">
    <h1>Welcome to TASTE GO</h1>
    <p>Your journey to amazing food starts here! Discover delicious meals, order easily, and enjoy.</p>
    <a href="login.html" class="btn">Explore Now</a>
</div>

</body>
</html>
