<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TASTE GO - Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #ff4d4d 0%, #ff6b6b 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    header {
      margin-bottom: 40px;
      text-align: center;
      animation: fadeInDown 0.8s ease;
    }

    header h1 {
      color: #fff;
      font-size: 42px;
      font-weight: 700;
      letter-spacing: 1px;
      text-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      margin-bottom: 10px;
    }

    header p {
      color: rgba(255, 255, 255, 0.9);
      font-size: 16px;
      font-weight: 300;
    }

    main {
      width: 100%;
      max-width: 450px;
      animation: fadeInUp 0.8s ease;
    }

    form {
      background: #fff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      width: 100%;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    form:hover {
      transform: translateY(-5px);
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.4);
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #333;
      margin-bottom: 12px;
      margin-top: 20px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    label:first-child {
      margin-top: 0;
    }

    input, select {
      display: block;
      width: 100%;
      padding: 14px 16px;
      font-size: 15px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      margin-bottom: 20px;
      transition: all 0.3s ease;
      background-color: #f9f9f9;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    input::placeholder, select {
      color: #999;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #ff4d4d;
      background-color: #fff;
      box-shadow: 0 0 0 3px rgba(255, 77, 77, 0.1);
    }

    select {
      cursor: pointer;
      padding: 14px 16px;
      appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23ff4d4d' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 12px center;
      background-size: 20px;
      padding-right: 40px;
    }

    button {
      display: block;
      width: 100%;
      padding: 14px;
      font-size: 16px;
      font-weight: 600;
      background: linear-gradient(135deg, #ff4d4d 0%, #cc0000 100%);
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 10px;
      box-shadow: 0 4px 15px rgba(255, 77, 77, 0.3);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(255, 77, 77, 0.5);
      background: linear-gradient(135deg, #cc0000 0%, #990000 100%);
    }

    button:active {
      transform: translateY(0);
    }

    .register-link {
      text-align: center;
      margin-top: 25px;
      color: rgba(255, 255, 255, 0.9);
      font-size: 14px;
    }

    .register-link a {
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
      border-bottom: 2px solid rgba(255, 255, 255, 0.3);
      padding-bottom: 2px;
    }

    .register-link a:hover {
      border-bottom-color: rgba(255, 255, 255, 0.9);
    }

    .footer-links {
      text-align: center;
      margin-top: 20px;
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 600px) {
      header h1 {
        font-size: 32px;
      }

      form {
        padding: 30px 20px;
      }

      input, select, button {
        font-size: 14px;
        padding: 12px;
      }

      select {
        background-position: right 10px center;
        padding-right: 35px;
      }
    }

    @media (max-width: 400px) {
      header h1 {
        font-size: 28px;
      }

      form {
        padding: 25px 15px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>🍽️ TASTEGO</h1>
    <p>Login to your account</p>
  </header>
  <main>
    <form id="loginForm">
      <label for="loginType">Select Your Role</label>
      <select id="loginType" required>
        <option value="" disabled selected>Choose Login Type</option>
        <option value="student">👨‍🎓 Student</option>
        <option value="admin">🔐 Admin</option>
        <option value="restaurant">🏪 Restaurant</option>
      </select>

      <div id="fieldsContainer"></div>

      <button type="submit">Login</button>
    </form>

    <div class="footer-links">
      <div class="register-link">
        Don't have an account? <a href="register.html">Register here</a>
      </div>
    </div>
  </main>

<script>

const loginTypeSelector =
document.getElementById("loginType");

const fieldsContainer =
document.getElementById("fieldsContainer");

const form =
document.getElementById("loginForm");

/* Change fields */

loginTypeSelector.addEventListener(
"change",
() => {

const loginType =
loginTypeSelector.value;

fieldsContainer.innerHTML = "";

if (loginType === "restaurant") {

fieldsContainer.innerHTML = `

<input
type="text"
id="restaurantName"
placeholder="Restaurant Name"
required
/>

<input
type="text"
id="restaurantCode"
placeholder="Generated Code"
required
/>

`;

}

else {

fieldsContainer.innerHTML = `

<input
type="email"
id="email"
placeholder="Enter Email"
required
/>

<input
type="password"
id="password"
placeholder="Enter Password"
required
/>

`;

}

}
);

/* LOGIN */

form.addEventListener(
"submit",
async function (e) {

e.preventDefault();

const loginType =
loginTypeSelector.value;

if (!loginType) {

alert("Please select login type");

return;

}

/* RESTAURANT LOGIN */

if (loginType === "restaurant") {

const name =
document.getElementById(
"restaurantName"
).value.trim();

const code =
document.getElementById(
"restaurantCode"
).value.trim();

try {

const res =
await fetch(
"https://tastego-production.up.railway.app/api/admin/restaurant/login",
{
method: "POST",
headers: {
"Content-Type":
"application/json"
},
body: JSON.stringify({
name,
code
})
}
);

const data =
await res.json();

if (res.ok) {

alert(
"Restaurant login successful"
);

/* CLEAR OLD DATA */

localStorage.removeItem(
"restaurantName"
);

localStorage.removeItem(
"restaurantId"
);

/* SAVE NEW RESTAURANT */

localStorage.setItem(
"restaurantName",
data.name
);

localStorage.setItem(
"restaurantId",
data.id
);

window.location.href =
"menu-management.html";

}

else {

alert(
"Invalid restaurant login"
);

}

}

catch (err) {

console.error(err);

alert("Server error");

}

}

/* STUDENT / ADMIN LOGIN */

else {

const email =
document.getElementById(
"email"
).value.trim();

const password =
document.getElementById(
"password"
).value.trim();

try {

const res =
await fetch(
"https://tastego-production.up.railway.app/api/user/login",
{
method: "POST",
headers: {
"Content-Type":
"application/json"
},
body: JSON.stringify({
email,
password
})
}
);

const data =
await res.json();

if (
res.ok &&
data.role &&
data.role.toLowerCase()
=== loginType
) {

alert(
"Login successful"
);

/* CLEAR OLD USER DATA */

localStorage.removeItem(
"studentEmail"
);

localStorage.removeItem(
"studentName"
);

/* SAVE CURRENT USER */

localStorage.setItem(
"studentEmail",
data.email
);

localStorage.setItem(
"studentName",
data.name
);

localStorage.setItem(
"userRole",
loginType
);

if (loginType === "student") {

window.location.href =
"student.html";

}

else {

localStorage.setItem(
"adminEmail",
data.email
);

window.location.href =
"admin.html";

}

}

else {

alert(
"Invalid credentials"
);

}

}

catch (err) {

console.error(err);

alert("Login failed");

}

}

}
);

/* Render fields on load */

window.addEventListener(
"DOMContentLoaded",
() => {

if (
loginTypeSelector.value
) {

loginTypeSelector.dispatchEvent(
new Event("change")
);

}

}
);

</script>
</body>
</html>
