<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TASTE GO - Login</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-color: #fff;
    }

    header h1 {
      margin-bottom: 20px;
      color: #d32f2f;
    }

    form {
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 400px;
    }

    label, select, input, button, a {
      display: block;
      width: 100%;
      margin-bottom: 15px;
    }

    input, select, button {
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    button {
      background-color: #d32f2f;
      color: #fff;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background-color: #c62828;
    }

    .forgot-password {
      text-align: center;
      color: #d32f2f;
      text-decoration: none;
    }

    .forgot-password:hover {
      text-decoration: underline;
    }

    select {
      border: 1px solid #d32f2f;
    }

    input:focus, select:focus {
      border-color: #c62828;
    }
  </style>
</head>
<body>
  <header>
    <h1>Login to TASTE GO</h1>
  </header>
  <main>
    <form id="loginForm">
      <label for="loginType">Choose Login Type:</label>
      <select id="loginType" required>
        <option value="" disabled selected>Select Login Type</option>
        <option value="student">Student</option>
        <option value="admin">Admin</option>
        <option value="restaurant">Restaurant</option>
      </select>

      <div id="fieldsContainer"></div>

      <button type="submit">Login</button>
    </form>

    <div class="register-link">
      Don't have an account? <a href="register.html">Register</a>
    </div>
    <a href="forgot-password.html" class="forgot-password">Forgot Password?</a>
  </main>

<script>

const loginTypeSelector =
document.getElementById("loginType");

const fieldsContainer =
document.getElementById("fieldsContainer");

const form =
document.getElementById("loginForm");

/* Change fields */

loginTypeSelector.addEventListener(
"change",
() => {

const loginType =
loginTypeSelector.value;

fieldsContainer.innerHTML = "";

if (loginType === "restaurant") {

fieldsContainer.innerHTML = `

<input
type="text"
id="restaurantName"
placeholder="Restaurant Name"
required
/>

<input
type="text"
id="restaurantCode"
placeholder="Generated Code"
required
/>

`;

}

else {

fieldsContainer.innerHTML = `

<input
type="email"
id="email"
placeholder="Enter Email"
required
/>

<input
type="password"
id="password"
placeholder="Enter Password"
required
/>

`;

}

}
);

/* LOGIN */

form.addEventListener(
"submit",
async function (e) {

e.preventDefault();

const loginType =
loginTypeSelector.value;

if (!loginType) {

alert("Please select login type");

return;

}

/* RESTAURANT LOGIN */

if (loginType === "restaurant") {

const name =
document.getElementById(
"restaurantName"
).value.trim();

const code =
document.getElementById(
"restaurantCode"
).value.trim();

try {

const res =
await fetch(
"http://localhost:8081/api/admin/restaurant/login",
{
method: "POST",
headers: {
"Content-Type":
"application/json"
},
body: JSON.stringify({
name,
code
})
}
);

const data =
await res.json();

if (res.ok) {

alert(
"Restaurant login successful"
);

/* CLEAR OLD DATA */

localStorage.removeItem(
"restaurantName"
);

localStorage.removeItem(
"restaurantId"
);

/* SAVE NEW RESTAURANT */

localStorage.setItem(
"restaurantName",
data.name
);

localStorage.setItem(
"restaurantId",
data.id
);

window.location.href =
"menu-management.html";

}

else {

alert(
"Invalid restaurant login"
);

}

}

catch (err) {

console.error(err);

alert("Server error");

}

}

/* STUDENT / ADMIN LOGIN */

else {

const email =
document.getElementById(
"email"
).value.trim();

const password =
document.getElementById(
"password"
).value.trim();

try {

const res =
await fetch(
"http://localhost:8081/api/user/login",
{
method: "POST",
headers: {
"Content-Type":
"application/json"
},
body: JSON.stringify({
email,
password
})
}
);

const data =
await res.json();

if (
res.ok &&
data.role &&
data.role.toLowerCase()
=== loginType
) {

alert(
"Login successful"
);

/* CLEAR OLD USER DATA */

localStorage.removeItem(
"studentEmail"
);

localStorage.removeItem(
"studentName"
);

/* SAVE CURRENT USER */

localStorage.setItem(
"studentEmail",
data.email
);

localStorage.setItem(
"studentName",
data.name
);

localStorage.setItem(
"userRole",
loginType
);

if (loginType === "student") {

window.location.href =
"student.html";

}

else {

localStorage.setItem(
"adminEmail",
data.email
);

window.location.href =
"admin.html";

}

}

else {

alert(
"Invalid credentials"
);

}

}

catch (err) {

console.error(err);

alert("Login failed");

}

}

}
);

/* Render fields on load */

window.addEventListener(
"DOMContentLoaded",
() => {

if (
loginTypeSelector.value
) {

loginTypeSelector.dispatchEvent(
new Event("change")
);

}

}
);

</script>
</body>
</html>
